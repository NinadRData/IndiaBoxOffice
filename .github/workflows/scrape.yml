name: Daily Sacnilk Scrape

on:
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper - Bhoot Bhangla
        run: python scraper/sacnilk_scraper.py "Bhoot Bhangla" --year 2025 --json
        continue-on-error: true

      - name: Run scraper - Dhurandhar 2
        run: python scraper/sacnilk_scraper.py "Dhurandhar 2" --year 2026 --json
        continue-on-error: true

      - name: Commit and push updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scraper/output/
          git diff --staged --quiet || git commit -m "chore: daily scrape $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
