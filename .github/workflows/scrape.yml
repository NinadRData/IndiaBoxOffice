name: Daily Sacnilk Scrape

on:
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('scraper/requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run tests
        run: pytest scraper/tests/ -v --tb=short

  scrape:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('scraper/requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Scrape all tracked films
        run: |
          python - <<'PYEOF'
          import json, subprocess, sys
          with open("scraper/films.json", encoding="utf-8") as f:
              films = json.load(f)
          failed = []
          for film in films:
              title = film["title"]
              year  = str(film["year"])
              slug  = film.get("slug", "")
              print(f"\n{'='*60}")
              print(f"Scraping: {title} ({year})")
              cmd = [sys.executable, "scraper/sacnilk_scraper.py",
                     title, "--year", year, "--output", "scraper/output/"]
              if slug:
                  cmd += ["--output-slug", slug]
              result = subprocess.run(cmd, capture_output=False)
              if result.returncode != 0:
                  failed.append(f"{title} ({year})")
          if failed:
              print(f"\n⚠  Failed to scrape: {', '.join(failed)}")
          sys.exit(0)  # never fail the workflow for individual film misses
          PYEOF

      - name: Commit and push updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scraper/output/
          git diff --staged --quiet || git commit -m "chore: daily scrape $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
